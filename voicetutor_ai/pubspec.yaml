name: voicetutor_ai
description: "Hands-free voice-based exam preparation Android app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.4.9
  speech_to_text: ^6.5.1
  flutter_tts: ^3.8.5
  porcupine_flutter: ^3.0.1
  google_generative_ai: ^0.4.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0
  firebase_auth: ^4.15.3
  shared_preferences: ^2.2.2
  lottie: ^3.0.0
  intl: ^0.19.0
  http: ^1.1.2
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  hive_generator: ^2.0.1
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/pyq_database.json
    - assets/lottie/mic_pulse.json
